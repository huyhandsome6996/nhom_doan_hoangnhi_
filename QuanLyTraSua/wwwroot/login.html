<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Quản Lý Trà Sữa</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/bridge.js"></script>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--clr-bg); }
    .login-wrap { width: 100%; max-width: 420px; padding: 20px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-icon { font-size: 3.5rem; display: block; margin-bottom: 12px; }
    .login-logo h1 { font-size: 1.5rem; font-weight: 800; color: var(--clr-primary); }
    .login-logo p { color: var(--clr-text-muted); font-size: 0.88rem; }
    .login-card { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow-lg); }
    .login-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; }
    .error-msg { background: rgba(239,68,68,0.15); border: 1px solid var(--clr-danger); border-radius: var(--radius); padding: 10px 14px; font-size: 0.85rem; color: var(--clr-danger); margin-bottom: 16px; display: none; }
    .hint-box { background: var(--clr-surface2); border-radius: var(--radius); padding: 12px 16px; margin-top: 20px; font-size: 0.8rem; color: var(--clr-text-muted); }
    .hint-box code { color: var(--clr-primary); background: rgba(249,115,22,0.1); padding: 1px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="login-wrap fade-in">
    <div class="login-logo">
      <span class="logo-icon">🧋</span>
      <h1>Trà Sữa Take Away</h1>
      <p>Hệ thống quản lý quán trà sữa</p>
    </div>
    <div class="login-card">
      <h2 class="login-title">Đăng Nhập</h2>
      <div id="errorMsg" class="error-msg">❌ <span id="errorText"></span></div>
      <div class="form-group">
        <label class="form-label" for="tenDangNhap">Tên đăng nhập</label>
        <input id="tenDangNhap" class="form-control" type="text" placeholder="Nhập tên đăng nhập..." autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="matKhau">Mật khẩu</label>
        <input id="matKhau" class="form-control" type="password" placeholder="Nhập mật khẩu..." autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="dangNhap()" id="btnDangNhap">
        🔓 Đăng Nhập
      </button>
      <div class="hint-box">
        <strong>Tài khoản mặc định:</strong><br>
        Admin: <code>admin</code> / <code>admin123</code><br>
        Nhân viên: <code>nhanvien1</code> / <code>nv123456</code><br>
        Khách hàng: <code>khachhang1</code> / <code>kh123456</code>
      </div>
    </div>
  </div>
  <script>
    let dangXuLy = false;

    function dangNhap() {
      if (dangXuLy) return;
      const tenDN = document.getElementById('tenDangNhap').value.trim();
      const matKhau = document.getElementById('matKhau').value.trim();
      if (!tenDN || !matKhau) {
        hienLoi('Vui lòng nhập đầy đủ thông tin!');
        return;
      }
      dangXuLy = true;
      document.getElementById('btnDangNhap').textContent = '⏳ Đang xử lý...';
      window.chrome.webview.postMessage(JSON.stringify({
        action: 'dangNhap',
        data: { tenDangNhap: tenDN, matKhau: matKhau }
      }));
    }

    function hienLoi(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').style.display = 'block';
      dangXuLy = false;
      document.getElementById('btnDangNhap').textContent = '🔓 Đăng Nhập';
    }

    window.chrome.webview.addEventListener('message', function(e) {
      try {
        const res = JSON.parse(e.data);
        if (res.action === 'dangNhap') {
          dangXuLy = false;
          document.getElementById('btnDangNhap').textContent = '🔓 Đăng Nhập';
          if (res.ok) {
            sessionStorage.setItem('nguoiDung', JSON.stringify(res.nguoiDung));
            const role = res.nguoiDung.vaiTro || res.nguoiDung.VaiTro || '';
            window.location.href = role === 'KhachHang' ? 'order.html' : 'admin.html';
          } else {
            hienLoi(res.loi || 'Đăng nhập thất bại!');
          }
        }
      } catch(err) { console.error(err); }
    });

    // Enter để đăng nhập
    document.addEventListener('keydown', e => { if (e.key === 'Enter') dangNhap(); });
  </script>
</body>
</html>
